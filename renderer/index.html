<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ШТАБ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="bg" id="bgA"></div><div class="bg" id="bgB"></div>
    <video class="bgv" id="bgv" muted loop playsinline></video><div class="scrim"></div>
    <aside class="sidebar">
      <div class="brand">
        <h1>ШТАБ</h1>
        <div class="sub">командный центр над проектами</div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <button class="foot-btn" id="notesBtn">Заметки</button>
        <button class="foot-btn" id="syncBtn">Синхра</button>
        <button class="foot-btn" id="settingsBtn">Настройки</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="tb-btn" id="backBtn" title="Назад">‹</div>
        <div class="tb-btn" id="fwdBtn" title="Вперёд">›</div>
        <div class="tb-btn" id="reloadBtn" title="Обновить">⟳</div>
        <div class="tb-title" id="title">Штаб</div>
        <div class="tb-spacer"></div>
        <div class="address" id="address"><span id="addrText"></span></div>
      </div>
      <div class="stage" id="stage">
        <!-- сюда монтируется webview проекта или заглушка -->
      </div>
    </main>
  </div>

  <div class="notes" id="notes">
    <div class="notes-head">
      <h3>Общие заметки</h3>
      <span class="saved" id="savedMark">сохраняется само</span>
    </div>
    <textarea id="notesText" placeholder="Мысли по всем проектам, что сделать, что проверить…&#10;&#10;Пишется прямо в файл — едет между компом и маком."></textarea>
  </div>

  <div class="palette" id="palette">
    <div class="pal-box">
      <input id="palInput" type="text" placeholder="Куда перейти…  (Ctrl+K)" spellcheck="false" autocomplete="off" />
      <div class="pal-list" id="palList"></div>
    </div>
  </div>

  <script src="qrcode.js"></script>
  <script src="app.js"></script>
</body>
</html>
